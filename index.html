<style>
/* Cards de tareas */
.card.grupo {
  transition: transform 0.2s, box-shadow 0.2s;
}
.card.grupo:hover {
  transform: translateY(-5px);
  box-shadow: 0 10px 20px rgba(0,0,0,0.15);
}

/* Previews de imágenes */
.preview img{
  height:120px;
  object-fit:cover;
  border-radius:8px;
  border:1px solid #ccc;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
  transition: transform 0.2s;
}
.preview img:hover {
  transform: scale(1.05);
}
/* Efecto dragover */
.paste-zone {
  min-height: 150px;
  width: 100%;
  position: relative;
  z-index: 999; /* 🔥 importante */
  pointer-events: all;
  border: 2px dashed #ccc;
  border-radius: 8px;
  padding: 12px;
  cursor: pointer;
  transition: 0.2s;
  background: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  color: #666;
}

.paste-zone:hover {
  background: #f1f1f1;
}

.paste-zone.dragover {
  background: #d0ebff;
  border-color: #0d6efd;
  color: #0d6efd;
  transform: scale(1.02);
  box-shadow: 0 0 10px rgba(13,110,253,0.3);
}
  
/* Footer minimalista */
footer {
  backdrop-filter: blur(5px);
  background: rgba(255,255,255,0.9);
  font-size: 13px;
  padding: 6px;
  border-top: 1px solid #ddd;
}

/* Navbar logo y estilo */
.navbar-brand img {
  height:80px;
  margin-right:10px;
}
</style>

// =============================
// 📷 PREVIEW DE IMÁGENES
// =============================
function actualizarPreview(input){
  const files = Array.from(input.files);

  if (files.length > 4) {
    alert("Máximo 4 imágenes");
    input.value = "";
    return;
  }

  const preview = input.closest(".grupo").querySelector(".preview");
  preview.innerHTML = "";

  files.forEach(file=>{
    const reader = new FileReader();
    reader.onload = ev=>{
      preview.innerHTML += `
        <div class="col-md-3 mb-2">
          <img src="${ev.target.result}" class="img-fluid rounded border">
        </div>`;
    };
    reader.readAsDataURL(file);
  });
}


// =============================
// 🖱️ DRAG & DROP GLOBAL
// =============================
document.addEventListener("dragover", e => e.preventDefault());
document.addEventListener("drop", e => e.preventDefault());


// =============================
// 🎯 DRAG SOBRE ZONA
// =============================
document.addEventListener("dragenter", (e) => {
  const zona = e.target.closest(".paste-zone");
  if (zona) {
    zona.classList.add("dragover");
    zona.textContent = "Soltá la imagen acá 📥";
  }
});

document.addEventListener("dragleave", (e) => {
  const zona = e.target.closest(".paste-zone");
  if (zona) {
    zona.classList.remove("dragover");
    zona.textContent = "📷 Pegá imágenes aquí (Ctrl+V) o arrastralas";
  }
});


// =============================
// 📥 DROP DE IMÁGENES
// =============================
document.addEventListener("drop", (e) => {

  const zona = e.target.closest(".paste-zone");
  if (!zona) return;

  zona.classList.remove("dragover");
  zona.textContent = "📷 Pegá imágenes aquí (Ctrl+V) o arrastralas";

  const grupo = zona.closest(".grupo");
  const input = grupo.querySelector(".fotos");

  const dt = new DataTransfer();

  // mantener existentes
  Array.from(input.files || []).forEach(f => dt.items.add(f));

  const files = e.dataTransfer.files;

  for (let i = 0; i < files.length; i++) {
    if (files[i].type.startsWith("image/")) {
      dt.items.add(files[i]);
    }
  }

  if (dt.files.length > 4) {
    alert("Máximo 4 imágenes");
    return;
  }

  input.files = dt.files;
  actualizarPreview(input);

});


// =============================
// 🖱️ CLICK EN ZONA
// =============================
document.addEventListener("click", (e) => {
  if (e.target.classList.contains("paste-zone")) {
    const zona = e.target;

    zona.textContent = "📋 Ahora presioná CTRL + V para pegar";
    zona.focus();

    setTimeout(() => {
      zona.textContent = "📷 Pegá imágenes aquí (Ctrl+V) o arrastralas";
    }, 2000);
  }
});

// =============================
// 📋 PEGAR EN ZONA CON CTRL + v
// =============================
document.addEventListener("paste", (e) => {

  if (pegando) return; // 🚫 evita doble ejecución
  pegando = true;

  setTimeout(() => pegando = false, 100);

  const zona = document.activeElement;
  if (!zona || !zona.classList.contains("paste-zone")) return;

  e.preventDefault();

  const grupo = zona.closest(".grupo");
  const input = grupo.querySelector(".fotos");

  const dt = new DataTransfer();

  Array.from(input.files || []).forEach(f => dt.items.add(f));

  const items = e.clipboardData.items;

  for (let i = 0; i < items.length; i++) {
    if (items[i].type.startsWith("image/")) {
      const file = items[i].getAsFile();
      dt.items.add(file);
    }
  }

  input.files = dt.files;
  input.dispatchEvent(new Event("change", { bubbles: true }));
});

// ➕ AGREGAR GRUPO
// =============================
document.getElementById('addGroup').addEventListener('click', async () => {
  count++;
  const clone = document.querySelector('.grupo').cloneNode(true);

  clone.querySelector("h5").innerText = "Tarea " + count;
  clone.querySelectorAll("[name]").forEach(el => {
    el.name = el.name.replace(/_\d+$/, "_" + count);
    if(el.type !== "file") el.value = "";
  });

  clone.querySelector(".preview").innerHTML = "";
  clone.querySelector(".progress-bar").style.width = "0%";

  document.getElementById("grupos").appendChild(clone);
