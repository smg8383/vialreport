<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
  background:#f5f5f5;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  width:350px;
  padding:20px;
  border-radius:10px;
  box-shadow:0 0 15px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<div class="card">

  <!-- LOGIN -->
  <div id="loginBox">
    <h4 class="mb-3 text-center">Ingresar</h4>

    <input id="email" class="form-control mb-2" placeholder="Email">
    <input id="password" type="password" class="form-control mb-3" placeholder="Password">

    <button id="btnLogin" class="btn btn-primary w-100 mb-2">Ingresar</button>

    <button class="btn btn-link w-100" onclick="mostrarRegistro()">Crear cuenta</button>
  </div>

  <!-- REGISTRO -->
  <div id="registroBox" style="display:none;">
    <h4 class="mb-3 text-center">Registro</h4>

    <input id="emailReg" class="form-control mb-2" placeholder="Email">
    <input id="passwordReg" type="password" class="form-control mb-2" placeholder="Password">

    <input id="empresa" class="form-control mb-2" placeholder="Nombre de empresa">
    <input id="logo" type="file" class="form-control mb-3">

    <button id="btnRegister" class="btn btn-success w-100 mb-2">Registrarse</button>

    <button class="btn btn-link w-100" onclick="mostrarLogin()">Volver</button>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseClient = supabase.createClient(
  "https://yepethuzzretakioqyqy.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InllcGV0aHV6enJldGFraW9xeXF5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NTQwMDcsImV4cCI6MjA5MDUzMDAwN30.1sRjLDe56C7ILa6n3zNHjbC9cl4nAwr-Pkp--uzoXQs"
);

// 🔄 CAMBIAR VISTAS
function mostrarRegistro(){
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("registroBox").style.display = "block";
}

function mostrarLogin(){
  document.getElementById("loginBox").style.display = "block";
  document.getElementById("registroBox").style.display = "none";
}

// 🔐 LOGIN
document.getElementById("btnLogin").addEventListener("click", async () => {

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabaseClient.auth.signInWithPassword({
    email,
    password
  });

  if (error) return alert(error.message);

  window.location.href = "index.html";
});

// 🧾 REGISTRO COMPLETO
document.getElementById("btnRegister").addEventListener("click", async () => {

  const email = document.getElementById("emailReg").value;
  const password = document.getElementById("passwordReg").value;
  const empresaNombre = document.getElementById("empresa").value;
  const file = document.getElementById("logo").files[0];

  if (!email || !password || !empresaNombre || !file) {
    return alert("Completá todos los campos");
  }

  // 1️⃣ Crear usuario
  const { error } = await supabaseClient.auth.signUp({
    email,
    password
  });

  if (error) return alert(error.message);

  // 🔥 LOGIN AUTOMÁTICO (CORREGIDO)
  const { data: loginData, error: loginError } = await supabaseClient.auth.signInWithPassword({
    email,
    password
  });

  if (loginError) return alert(loginError.message);

  const user = loginData.user;

  // 2️⃣ Subir logo
  const fileName = `${Date.now()}_${file.name}`;

  const { error: uploadError } = await supabaseClient.storage
    .from("logos")
    .upload(fileName, file);

  if (uploadError) return alert(uploadError.message);

  const logoUrl = `https://yepethuzzretakioqyqy.supabase.co/storage/v1/object/public/logos/${fileName}`;

  // 3️⃣ Guardar empresa
  const { error: dbError } = await supabaseClient
    .from("empresas")
    .insert([{
      
      nombre: empresaNombre,
      logo: logoUrl,
      user_id: user.id
    }]);

  if (dbError) return alert(dbError.message);

  alert("Cuenta creada correctamente ✅");

  // 🚀 ENTRAR DIRECTO AL SISTEMA
setTimeout(() => {
  window.location.href = "index.html";
}, 500);
});
</script>

</body>
</html>
